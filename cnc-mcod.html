<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CNC M-cod · HMI Dashboard</title>
<style>
/* ============================================================
   CSS TOKENEK – Glassmorphism + Neon
   ============================================================ */
:root{
  --bg-0:#070a10; --bg-1:#0b111c;
  --glass:rgba(255,255,255,.045); --glass-strong:rgba(255,255,255,.07);
  --stroke:rgba(255,255,255,.10); --stroke-soft:rgba(255,255,255,.06);
  --txt:#e8eef7; --txt-dim:#93a1b5; --txt-faint:#5f6f84;
  --cyan:#2ee6ff; --green:#34ffab;
  --cyan-glow:rgba(46,230,255,.35); --green-glow:rgba(52,255,171,.30);
  --c-prog:#ff6b81; --c-prog-glow:rgba(255,107,129,.30);
  --c-table:#2ee6ff; --c-table-glow:rgba(46,230,255,.30);
  --c-vac:#b085ff; --c-vac-glow:rgba(176,133,255,.30);
  --c-move:#34ffab; --c-move-glow:rgba(52,255,171,.30);
  --c-act:#ffc234; --c-act-glow:rgba(255,194,52,.30);
  --radius:20px; --radius-sm:13px;
  --shadow:0 18px 50px -18px rgba(0,0,0,.75);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --transition:.25s ease;
}
html[data-theme="light"]{
  --bg-0:#eef2f8; --bg-1:#ffffff;
  --glass:rgba(15,25,45,.035); --glass-strong:rgba(15,25,45,.06);
  --stroke:rgba(15,25,45,.12); --stroke-soft:rgba(15,25,45,.07);
  --txt:#132033; --txt-dim:#48586e; --txt-faint:#7d8da0;
  --shadow:0 18px 45px -20px rgba(30,50,90,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--txt);background:var(--bg-0);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:28px}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:
  radial-gradient(60vw 55vh at 8% -5%,rgba(46,230,255,.14),transparent 60%),
  radial-gradient(55vw 50vh at 100% 0%,rgba(52,255,171,.12),transparent 55%),
  radial-gradient(70vw 60vh at 50% 115%,rgba(176,133,255,.10),transparent 60%)}
/* ---------- LAYOUT ---------- */
.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
/* ---------- SIDEBAR ---------- */
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;padding:24px 18px 34px;
  background:linear-gradient(180deg,var(--glass-strong),var(--glass));
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-right:1px solid var(--stroke);display:flex;flex-direction:column;gap:8px}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.brand .logo{width:52px;height:52px;flex:0 0 52px;border-radius:14px;display:grid;place-items:center;font-size:28px;
  background:linear-gradient(135deg,rgba(46,230,255,.25),rgba(52,255,171,.22));
  border:1px solid var(--stroke);box-shadow:0 0 22px var(--cyan-glow) inset}
.brand h1{font-size:32px;font-weight:800;letter-spacing:.3px;line-height:1.1}
.brand span{font-size:14px;color:var(--txt-dim);letter-spacing:2px;text-transform:uppercase}
/* Kereső a sidebarban */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;opacity:.7}
#search{width:100%;padding:13px 38px 13px 44px;font-size:22px;color:var(--txt);background:var(--glass);
  border:1px solid var(--stroke);border-radius:14px;font-family:var(--sans);transition:.2s}
#search:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 4px var(--cyan-glow)}
#search::placeholder{color:var(--txt-faint)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--txt-faint);cursor:pointer;font-size:20px;padding:4px}
.nav-title{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt-faint);margin:14px 6px 6px;font-weight:700}
.nav-list{display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:14px;padding:12px 15px;border-radius:12px;cursor:pointer;
  font-size:28px;font-weight:600;color:var(--txt-dim);background:transparent;border:1px solid transparent;
  transition:var(--transition);font-family:var(--sans);text-decoration:none}
.nav-item .ico{font-size:24px;width:30px;text-align:center}
.nav-item:hover{background:var(--glass);color:var(--txt);transform:translateX(2px)}
.nav-item.active{color:var(--txt);background:var(--glass-strong);border-color:var(--stroke);box-shadow:0 0 18px var(--cyan-glow) inset}
.nav-item.active .ico{filter:drop-shadow(0 0 6px var(--cyan-glow))}
.sidebar .lang-switch{display:none}
.theme-btn{background:var(--glass);border:1px solid var(--stroke);color:var(--txt-dim);padding:11px 14px;
  border-radius:12px;cursor:pointer;font-size:27px;font-weight:600;transition:var(--transition);
  font-family:var(--sans);margin-top:8px;display:flex;align-items:center;gap:10px;justify-content:center}
.theme-btn:hover{color:var(--txt);border-color:var(--cyan);box-shadow:0 0 14px var(--cyan-glow)}
#dlBtn:hover{border-color:var(--green);box-shadow:0 0 14px var(--green-glow)}
/* ---------- MAIN ---------- */
.main{padding:24px clamp(18px,3vw,44px) 60px;max-width:1480px;width:100%}
.topbar{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.hamburger{display:none;background:var(--glass);border:1px solid var(--stroke);color:var(--txt);
  width:52px;height:52px;border-radius:14px;font-size:26px;cursor:pointer}
.page-title{font-size:clamp(28px,3.8vw,40px);font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:14px}
.page-title .pt-ico{font-size:34px}
.page-sub{color:var(--txt-dim);font-size:19px;margin-top:2px}
.spacer{flex:1}
.stat-pill{font-family:var(--mono);font-size:15px;color:var(--txt-dim);background:var(--glass);
  border:1px solid var(--stroke);padding:8px 15px;border-radius:999px}
#view{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ---------- DASHBOARD ---------- */
.dash-lang{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:22px;background:var(--glass);padding:10px 14px;border-radius:18px;border:1px solid var(--stroke)}
.dash-lang .lang-btn{background:transparent;border:none;color:var(--txt-dim);font-weight:700;font-size:24px;padding:8px 18px;border-radius:999px;cursor:pointer;transition:.15s;font-family:var(--sans)}
.dash-lang .lang-btn:hover{color:var(--txt)}
.dash-lang .lang-btn.active{background:var(--cyan);color:#06121a;box-shadow:0 0 14px var(--cyan-glow)}
.dash-search{max-width:700px;margin:0 auto 30px auto;position:relative}
.dash-search input{width:100%;padding:18px 24px 18px 60px;font-size:24px;color:var(--txt);background:var(--glass-strong);border:2px solid var(--stroke);border-radius:18px;font-family:var(--sans);transition:.2s}
.dash-search input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 5px var(--cyan-glow)}
.dash-search .ico{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.7}
.dash-cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:22px;max-width:1100px;margin:0 auto}
.dash-cat{background:linear-gradient(160deg,var(--glass-strong),var(--glass));border:1px solid var(--stroke);border-radius:var(--radius);padding:22px 16px;text-align:center;cursor:pointer;transition:var(--transition);box-shadow:var(--shadow);position:relative;overflow:hidden}
.dash-cat::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--cat);box-shadow:0 0 20px var(--cat)}
.dash-cat:hover{transform:translateY(-6px);border-color:var(--cat);box-shadow:0 18px 40px -14px var(--cat),0 0 30px -10px var(--cat)}
.dash-cat .ico{font-size:48px;display:block;margin-bottom:6px}
.dash-cat .name{font-size:20px;font-weight:800;margin-bottom:2px}
.dash-cat .count{font-size:16px;color:var(--txt-dim)}
.dash-info{text-align:center;color:var(--txt-dim);font-size:20px;margin:28px 0 6px;opacity:.8}
/* ---------- M-KÓDOK ---------- */
.category{margin-bottom:22px;scroll-margin-top:20px}
.cat-head{display:flex;align-items:center;gap:16px;cursor:pointer;user-select:none;padding:18px 22px;border-radius:var(--radius);background:linear-gradient(120deg,var(--glass-strong),var(--glass));border:1px solid var(--stroke);backdrop-filter:blur(16px);transition:var(--transition);position:relative;overflow:hidden}
.cat-head::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--cat);box-shadow:0 0 20px var(--cat)}
.cat-head:hover{border-color:var(--cat);box-shadow:0 0 24px -6px var(--cat)}
.cat-ico{width:54px;height:54px;flex:0 0 54px;border-radius:14px;display:grid;place-items:center;font-size:26px;background:color-mix(in srgb,var(--cat) 18%,transparent);border:1px solid color-mix(in srgb,var(--cat) 45%,transparent);box-shadow:0 0 18px -4px var(--cat)}
.cat-titles{flex:1;min-width:0}
.cat-titles h2{font-size:23px;font-weight:800}
.cat-titles .sub{font-size:16px;color:var(--txt-dim);font-style:italic}
.cat-count{font-family:var(--mono);font-size:15px;color:var(--cat);border:1px solid color-mix(in srgb,var(--cat) 40%,transparent);padding:5px 12px;border-radius:999px;background:color-mix(in srgb,var(--cat) 10%,transparent)}
.cat-chev{font-size:19px;color:var(--txt-dim);transition:transform .28s ease}
.category.collapsed .cat-chev{transform:rotate(-90deg)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:18px 2px 4px;transition:.3s}
.category.collapsed .cards{display:none}
.card{position:relative;border-radius:var(--radius);padding:18px 16px 16px;background:linear-gradient(160deg,var(--glass-strong),var(--glass));border:1px solid var(--stroke);backdrop-filter:blur(14px);box-shadow:var(--shadow);transition:transform .22s,box-shadow .22s,border-color .22s;animation:pop .35s ease both}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.card:hover{transform:translateY(-4px);border-color:var(--cat);box-shadow:0 22px 44px -20px var(--cat),0 0 30px -12px var(--cat)}
.card-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.code-badge{font-family:var(--mono);font-weight:800;font-size:42px;letter-spacing:.5px;color:#06121a;background:var(--cat);padding:4px 14px;border-radius:12px;box-shadow:0 0 20px -3px var(--cat)}
.card-titles{flex:1;min-width:0}
.card-titles .hu{font-size:24px;font-weight:800;line-height:1.2}
.card-titles .ro{display:none}
.card-actions{display:flex;gap:4px}
.icon-btn{background:var(--glass);border:1px solid var(--stroke);color:var(--txt-dim);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:18px;display:grid;place-items:center;transition:.15s}
.icon-btn:hover{color:var(--txt);border-color:var(--cat);background:var(--glass-strong)}
.card-desc-top{font-size:28px;font-weight:500;margin:4px 0 11px 0;color:var(--txt);line-height:1.4;border-left:5px solid var(--cat);padding-left:14px;background:rgba(255,255,255,.03);border-radius:0 8px 8px 0}
.card-field{margin-top:9px}
.card-field .lbl{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--txt-faint);font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.card-field .val{font-size:20px;color:var(--txt)}
.card-field .val.mono{font-family:var(--mono);font-size:20px;color:var(--cyan);background:rgba(46,230,255,.08);border:1px solid var(--stroke-soft);padding:5px 9px;border-radius:10px;display:inline-block}
.warn{margin-top:11px;font-size:18px;color:#ffd9d0;background:rgba(255,107,129,.10);border:1px solid rgba(255,107,129,.35);border-radius:12px;padding:8px 12px;display:flex;gap:8px;align-items:flex-start}
.warn .wi{flex:0 0 auto}
.note-box{margin-top:11px;display:none}
.note-box.show{display:block}
.note-box textarea{width:100%;min-height:56px;resize:vertical;font-size:20px;color:var(--txt);font-family:var(--sans);background:var(--glass);border:1px solid var(--stroke);border-radius:11px;padding:9px}
.note-box textarea:focus{outline:none;border-color:var(--cat)}
/* ---------- ELMETÉRKÉP (SVG) ---------- */
.mindmap-wrap{max-width:1200px;margin:0 auto;padding:10px 0;overflow:hidden}
.mm-title{text-align:center;font-size:32px;font-weight:800;margin-bottom:14px}
.mm-controls{display:flex;gap:12px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.mm-controls button{background:var(--glass);border:1px solid var(--stroke);color:var(--txt);padding:9px 18px;border-radius:999px;cursor:pointer;font-size:24px;font-weight:600;transition:var(--transition);font-family:var(--sans)}
.mm-controls button:hover{border-color:var(--cyan);box-shadow:0 0 16px var(--cyan-glow)}
.mm-container{
  position:relative;
  background:var(--glass);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  width:100%;
  height:1260px;
  overflow:hidden;
  touch-action:none;
  padding:10px;
}
.mm-container svg{
  display:block;
  width:100%;
  height:100%;
  cursor:grab;
}
.mm-container svg:active{cursor:grabbing}
.mm-node-text{font-size:18px;font-weight:700;fill:var(--txt);dominant-baseline:central;text-anchor:middle}
.mm-node-text-code{font-size:14px;font-weight:600;fill:#39ff14;dominant-baseline:central;text-anchor:middle}
.mm-node-text-cat{font-size:13px;font-weight:600;fill:var(--txt-dim);dominant-baseline:central;text-anchor:middle}
.mm-circle-cat{cursor:pointer;transition:filter .2s}
.mm-circle-cat:hover{filter:brightness(1.3)}
.mm-code-rect{cursor:pointer;transition:filter .2s}
.mm-code-rect:hover{filter:brightness(1.5)}
.mm-connector-line{stroke-width:1.5;fill:none;opacity:0.5}
/* ---------- MUNKAMENETEK ---------- */
.flow-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.flow-tab{font-size:24px;font-weight:700;padding:10px 18px;border-radius:12px;cursor:pointer;background:var(--glass);border:1px solid var(--stroke);color:var(--txt-dim);transition:.16s;font-family:var(--sans)}
.flow-tab:hover{color:var(--txt);background:var(--glass-strong)}
.flow-tab.active{color:#06121a;background:linear-gradient(120deg,var(--cyan),var(--green));border-color:transparent;box-shadow:0 0 20px -6px var(--cyan-glow)}
.flow-title{font-size:26px;font-weight:800;margin-bottom:4px}
.flow-desc{color:var(--txt-dim);font-size:19px;margin-bottom:20px}
.flowchart{display:flex;flex-direction:column;align-items:center;gap:0}
.flow-step{width:100%;max-width:560px}
.flow-node{display:flex;align-items:center;gap:16px;padding:14px 20px;border-radius:18px;background:linear-gradient(160deg,var(--glass-strong),var(--glass));border:1px solid var(--stroke);backdrop-filter:blur(12px);box-shadow:var(--shadow);position:relative;animation:slidein .4s ease both}
@keyframes slidein{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
.flow-node::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:18px 0 0 18px;background:var(--fc,var(--cyan))}
.flow-node .fc-code{font-family:var(--mono);font-weight:800;font-size:28px;color:#06121a;background:var(--fc,var(--cyan));padding:5px 11px;border-radius:10px;min-width:64px;text-align:center;box-shadow:0 0 16px -3px var(--fc,var(--cyan))}
.flow-node .fc-txt{flex:1}
.flow-node .fc-txt .fh{font-size:24px;font-weight:700}
.flow-node .fc-txt .fr{font-size:15px;color:var(--txt-dim);font-style:italic}
.flow-node.plain .fc-code{background:var(--glass-strong);color:var(--txt);box-shadow:none;font-family:var(--sans);font-size:28px;min-width:44px}
.flow-arrow{height:26px;width:2px;background:linear-gradient(var(--cyan),var(--green));position:relative;margin:2px 0}
.flow-arrow::after{content:"";position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid var(--green)}
/* ---------- BIZTONSÁG ---------- */
.safety-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:22px}
.safety-card{background:linear-gradient(160deg,var(--glass-strong),var(--glass));border:1px solid var(--stroke);border-radius:var(--radius);padding:20px 18px;backdrop-filter:blur(12px);box-shadow:var(--shadow);transition:var(--transition)}
.safety-card:hover{border-color:var(--c-prog);box-shadow:0 0 28px -8px var(--c-prog-glow)}
.safety-card h3{font-size:22px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.safety-card ul{list-style:none;padding:0}
.safety-card li{padding:5px 0;font-size:24px;border-bottom:1px solid var(--stroke-soft);display:flex;gap:10px;align-items:baseline}
.safety-card li:last-child{border-bottom:none}
.safety-card .badge{font-family:var(--mono);font-size:13px;background:var(--c-prog-glow);color:var(--c-prog);padding:0 10px;border-radius:999px}
/* ---------- CNC SZÓTÁR ---------- */
.dict-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.dict-dl{background:var(--glass);border:1px solid var(--stroke);color:var(--txt);padding:10px 18px;border-radius:12px;cursor:pointer;font-size:24px;font-weight:700;transition:var(--transition);font-family:var(--sans);display:flex;align-items:center;gap:10px}
.dict-dl:hover{border-color:var(--green);box-shadow:0 0 16px var(--green-glow)}
.dict-list{display:grid;grid-template-columns:1fr;gap:6px}
.dict-item{display:grid;grid-template-columns:110px 1fr 1fr 2fr;gap:12px;padding:11px 15px;background:var(--glass);border-radius:12px;border:1px solid var(--stroke);align-items:center;font-size:24px;transition:var(--transition)}
.dict-item:hover{border-color:var(--cyan)}
.dict-item .d-code{font-family:var(--mono);font-weight:800;color:var(--cyan)}
.dict-item .d-hu{font-weight:600}
.dict-item .d-ro{color:var(--txt-dim);font-style:italic}
.dict-item .d-exp{color:var(--txt-dim);font-size:22px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:#0a0f18;border:1px solid var(--cyan);color:var(--txt);padding:12px 22px;border-radius:14px;font-size:24px;font-weight:600;box-shadow:0 0 26px -6px var(--cyan-glow);transition:.3s;z-index:100;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;backdrop-filter:blur(2px)}
.empty{text-align:center;padding:60px 20px;color:var(--txt-dim)}
.empty .big{font-size:46px;margin-bottom:12px}
/* ---------- SZERKESZTŐ (M-kód editor) ---------- */
.ed-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.ed-modal{max-width:680px;width:100%;background:var(--bg-1);border:1px solid var(--cyan);border-radius:var(--radius);padding:26px 22px;box-shadow:0 0 50px -10px var(--cyan-glow);position:relative;margin:auto 0}
.ed-modal h2{font-size:28px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ed-hint{font-size:16px;color:var(--txt-dim);margin-bottom:10px}
.ed-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ed-field{margin-top:12px}
.ed-field label{display:block;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--txt-faint);font-weight:700;margin-bottom:4px}
.ed-field input,.ed-field textarea,.ed-field select{width:100%;padding:11px 13px;font-size:21px;color:var(--txt);background:var(--glass);border:1px solid var(--stroke);border-radius:11px;font-family:var(--sans)}
.ed-field select option{background:var(--bg-1);color:var(--txt)}
.ed-field textarea{min-height:66px;resize:vertical}
.ed-field input:focus,.ed-field textarea:focus,.ed-field select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow)}
.ed-field input.mono,.ed-field textarea.mono{font-family:var(--mono)}
.ed-langtabs{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
.ed-langtab{background:var(--glass);border:1px solid var(--stroke);color:var(--txt-dim);font-weight:700;font-size:19px;padding:7px 16px;border-radius:999px;cursor:pointer;font-family:var(--sans);transition:.15s}
.ed-langtab.active{background:var(--cyan);color:#06121a;border-color:transparent;box-shadow:0 0 14px var(--cyan-glow)}
.ed-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.ed-btn{border:none;border-radius:12px;padding:12px 20px;font-size:21px;font-weight:800;cursor:pointer;font-family:var(--sans);transition:.15s}
.ed-btn.primary{background:linear-gradient(120deg,var(--cyan),var(--green));color:#06121a;box-shadow:0 0 18px -4px var(--cyan-glow)}
.ed-btn.ghost{background:var(--glass);border:1px solid var(--stroke);color:var(--txt)}
.ed-btn.danger{background:rgba(255,107,129,.15);border:1px solid rgba(255,107,129,.45);color:#ff8a9a;margin-left:auto}
.ed-close{position:absolute;top:14px;right:14px;width:40px;height:40px;border-radius:10px;background:var(--glass);border:1px solid var(--stroke);color:var(--txt);font-size:20px;cursor:pointer}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
/* ---------- TELJES KÉPERNYŐS ELMETÉRKÉP ---------- */
body.mm-full .sidebar,body.mm-full .topbar,body.mm-full .print-title,body.mm-full .mm-title,body.mm-full .mm-hint-txt{display:none !important}
body.mm-full .app{grid-template-columns:1fr}
body.mm-full .main{padding:8px 10px;max-width:100%}
body.mm-full .mindmap-wrap{max-width:100%;padding:0}
body.mm-full .mm-controls{margin-bottom:8px}
body.mm-full .mm-container{height:calc(100vh - 88px)}
body.mm-full{overflow:hidden}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;z-index:50;width:min(340px,86vw);transform:translateX(-105%);transition:transform .3s}
  .sidebar.open{transform:none}
  .hamburger{display:grid;place-items:center}
  #backdrop.show{display:block}
  .dict-item{grid-template-columns:90px 1fr 1fr;gap:6px}
  .dict-item .d-exp{grid-column:1 / -1}
  .mm-container{height:78vh}
}
@media(max-width:560px){
  body{font-size:18px}
  .cards{grid-template-columns:1fr}
  .dash-cats{grid-template-columns:repeat(6,1fr);gap:8px}
  .dash-cat{grid-column:span 2;padding:13px 5px}
  .dash-cat:nth-child(4),.dash-cat:nth-child(5){grid-column:span 3}
  .dash-cat .name{font-size:11px;font-weight:700;letter-spacing:-0.3px;overflow-wrap:break-word}
  .dash-cat .count{font-size:11.5px}
  .mm-container{height:70vh;padding:6px}
  .dict-item{grid-template-columns:80px 1fr;gap:4px;font-size:17px}
  .dict-item .d-ro{grid-column:2}
  .dict-item .d-exp{grid-column:1 / -1;font-size:15px}
  .brand h1{font-size:24px}
  .nav-item{font-size:20px;padding:10px 13px}
  .theme-btn{font-size:19px}
  .page-sub{font-size:15px}
  .code-badge{font-size:26px;padding:3px 10px}
  .card-titles .hu{font-size:19px}
  .card-desc-top{font-size:18px;padding-left:10px}
  .card-field .val{font-size:16px}
  .card-field .val.mono{font-size:15px}
  .warn{font-size:15px}
  .cat-titles h2{font-size:18px}
  .cat-ico{width:44px;height:44px;flex-basis:44px;font-size:20px}
  .dash-lang .lang-btn{font-size:18px;padding:6px 14px}
  .dash-search input{font-size:18px;padding:14px 18px 14px 50px}
  .dash-cat .ico{font-size:32px}
  .dash-info{font-size:15px}
  .flow-tab{font-size:17px;padding:8px 13px}
  .flow-node .fc-code{font-size:19px;min-width:52px}
  .flow-node .fc-txt .fh{font-size:17px}
  .flow-node.plain .fc-code{font-size:19px}
  .flow-title{font-size:20px}
  .flow-desc{font-size:15px}
  .safety-card li{font-size:17px}
  .safety-card h3{font-size:18px}
  .mm-title{font-size:22px}
  .mm-controls button{font-size:17px;padding:8px 14px}
  .dict-dl{font-size:17px}
  #toast{font-size:17px}
  .ed-modal{padding:20px 14px}
  .ed-row{grid-template-columns:1fr}
  .ed-field input,.ed-field textarea,.ed-field select{font-size:17px}
  .ed-btn{font-size:17px;padding:11px 16px}
  .ed-modal h2{font-size:22px}
}
@media print{
  .sidebar,.topbar,.hamburger,.card-actions,.note-box,#toast,#backdrop,.flow-tabs,.lang-switch,.theme-btn,.mm-controls,.dict-actions,.toolbar{display:none !important}
  .app{grid-template-columns:1fr}
  .main{padding:0;max-width:100%}
  body{background:#fff;color:#000}
  .card,.cat-head,.flow-node,.dash-card,.safety-card{break-inside:avoid;box-shadow:none;border:1px solid #bbb;background:#fff}
  .category.collapsed .cards{display:grid !important}
  .code-badge,.cat-ico{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .print-title{display:block !important;font-size:28px;font-weight:800;margin-bottom:16px}
}
.print-title{display:none}

   ============================================================ */
const LS = "mcode_";
const LANGS = ["hu", "ro", "de", "en"];

function normalizeCode(m) {
    ["name", "exp", "when", "warn"].forEach(f => {
        if (typeof m[f] !== "object" || m[f] === null) m[f] = { hu: String(m[f] ?? ""), ro: "", de: "", en: "" };
        LANGS.forEach(l => { if (typeof m[f][l] !== "string") m[f][l] = ""; });
    });
    if (typeof m.ex !== "string") m.ex = String(m.ex ?? "");
    if (!CATS[m.cat]) m.cat = "move";
    return m;
}

function loadMcodes() {
    try {
        const s = localStorage.getItem(LS + "data");
        if (s) { const a = JSON.parse(s); if (Array.isArray(a) && a.length) return a.map(normalizeCode); }
    } catch (e) {}
    try {
        const el = document.getElementById("mcodeData");
        if (el && el.textContent.trim()) { const a = JSON.parse(el.textContent); if (Array.isArray(a) && a.length) return a.map(normalizeCode); }
    } catch (e) {}
    return JSON.parse(JSON.stringify(DEFAULT_MCODES));
}

let MCODES = loadMcodes();
let byCode = {};
function rebuildIndex() { byCode = Object.fromEntries(MCODES.map(m => [m.code, m])); }
rebuildIndex();

function saveMcodes() {
    try { localStorage.setItem(LS + "data", JSON.stringify(MCODES)); } catch (e) {}
    rebuildIndex();
}

let state = {
    page: "dashboard",
    search: "",
    filterCat: null,
    filters: { prog: true, table: true, vac: true, move: true, act: true },
    collapsed: JSON.parse(localStorage.getItem(LS + "collapsed") || "{}"),
    notes: JSON.parse(localStorage.getItem(LS + "notes") || "{}"),
    flow: "main",
    lang: localStorage.getItem(LS + "lang") || "ro",
    mmScale: 1, mmTranslateX: 0, mmTranslateY: 0,
};

const $ = s => document.querySelector(s);
const view = $("#view");

function t(key) { return UI_TEXTS[state.lang]?.[key] ?? UI_TEXTS.hu[key] ?? key; }
function catName(catKey) { return CATS[catKey]?.name?.[state.lang] ?? CATS[catKey]?.name?.hu ?? catKey; }
function getText(obj) {
    if (typeof obj === 'string') return obj;
    if (obj && obj[state.lang] !== undefined && obj[state.lang] !== "") return obj[state.lang];
    return obj?.hu ?? '';
}
function catColor(catKey) { return CATS[catKey]?.color ?? 'var(--cyan)'; }

function save() {
    localStorage.setItem(LS + "notes", JSON.stringify(state.notes));
    localStorage.setItem(LS + "collapsed", JSON.stringify(state.collapsed));
    localStorage.setItem(LS + "lang", state.lang);
}

function toast(msg) {
    const el = $("#toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(el._h);
    el._h = setTimeout(() => el.classList.remove("show"), 1900);
}

function filtered() {
    const q = state.search.trim().toLowerCase();
    return MCODES.filter(m => {
        if (state.filters[m.cat] === false) return false;
        if (state.filterCat && m.cat !== state.filterCat) return false;
        if (!q) return true;
        const searchable = [
            m.code.toLowerCase(),
            ...LANGS.map(l => (m.name[l] || "").toLowerCase()),
            getText(m.exp).toLowerCase(), getText(m.when).toLowerCase(), m.ex.toLowerCase(), getText(m.warn).toLowerCase()
        ];
        return searchable.some(s => s.includes(q));
    });
}

function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

function setPage(page, filterCat) {
    state.page = page;
    if (page !== "mindmap") document.body.classList.remove("mm-full");
    if (filterCat) state.filterCat = filterCat;
    else if (page !== 'mcodes') state.filterCat = null;
    document.querySelectorAll(".nav-item").forEach(el => el.classList.toggle("active", el.dataset.page === page));
    const meta = PAGE_META[page];
    if (meta) {
        $("#ptIco").textContent = meta.ico;
        $("#ptTitle").textContent = t(meta.titleKey);
        $("#ptSub").textContent = t(meta.subKey);
    }
    render();
    closeSidebar();
}

function render() {
    updateStat();
    applyLangToUI();
    const page = state.page;
    if (page === "dashboard") renderDashboard();
    else if (page === "mcodes") renderMcodes();
    else if (page === "mindmap") renderMindmap();
    else if (page === "flows") renderFlows();
    else if (page === "safety") renderSafety();
    else if (page === "dictionary") renderDictionary();
}

function updateStat() { /* jelvény eltávolítva kérésre */ }

function applyLangToUI() {
    document.querySelectorAll("[data-key]").forEach(el => {
        const key = el.dataset.key;
        if (UI_TEXTS[state.lang]?.[key] !== undefined) el.textContent = UI_TEXTS[state.lang][key];
    });
    document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === state.lang));
    $("#search").placeholder = t("search_placeholder");
    const isLight = document.documentElement.getAttribute("data-theme") === "light";
    $("#themeBtn").innerHTML = isLight ? "☀️ Temă" : "🌙 Temă";
}

        const c = CATS[key];

        return `<div class="dash-cat" style="--cat:${c.color}" data-cat="${key}">

/* ============================================================
   ELMETÉRKÉP – MINDEN M-KÓD LÁTSZIK (szektoros elrendezés)
   ============================================================ */
function renderMindmap() {
    const cats = Object.keys(CATS).filter(k => MCODES.some(m => m.cat === k));
    const total = MCODES.length || 1;
    const size = 1200, cx = size / 2, cy = size / 2;
    const R_CAT = 255;      // kategória körök távolsága a középponttól
    const R_RING1 = 410;    // belső kód-gyűrű
    const R_RING2 = 520;    // külső kód-gyűrű
    const catRadius = 73;
    const BOX_W = 78, BOX_H = 38;

    let nodesSvg = "", linesSvg = "";
    let angle = -90; // fok, felülről indulunk

    cats.forEach(key => {
        const c = CATS[key];
        const color = c.hex || "#2ee6ff";
        const codes = MCODES.filter(m => m.cat === key);
        const span = 360 * (0.5 / cats.length + 0.5 * codes.length / total);
        const midDeg = angle + span / 2;
        const midRad = midDeg * Math.PI / 180;
        const px = cx + R_CAT * Math.cos(midRad);
        const py = cy + R_CAT * Math.sin(midRad);

        linesSvg += `<line x1="${cx}" y1="${cy}" x2="${px.toFixed(1)}" y2="${py.toFixed(1)}" stroke="var(--stroke)" stroke-width="2"/>`;

        codes.forEach((m, j) => {
            const aDeg = angle + span * (j + 0.5) / codes.length;
            const aRad = aDeg * Math.PI / 180;
            const r = (j % 2 === 1) ? R_RING2 : R_RING1;
            const nx = cx + r * Math.cos(aRad);
            const ny = cy + r * Math.sin(aRad);
            const sx = px + catRadius * Math.cos(aRad);
            const sy = py + catRadius * Math.sin(aRad);
            linesSvg += `<line x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" class="mm-connector-line" style="stroke:${color};"/>`;
            nodesSvg += `<g class="mm-code-rect" data-code="${escapeHtml(m.code)}">
              <rect x="${(nx - BOX_W/2).toFixed(1)}" y="${(ny - BOX_H/2).toFixed(1)}" width="${BOX_W}" height="${BOX_H}" rx="10" fill="var(--glass-strong)" stroke="${color}" stroke-width="2" filter="url(#neonGlow)"/>
              <text x="${nx.toFixed(1)}" y="${ny.toFixed(1)}" class="mm-node-text-code" font-size="17">${escapeHtml(m.code)}</text>
            </g>`;
        });

        /* Kategória felirat 2 sorban, feljebb, nagyobb betűvel */
        const nm = catName(key);
        let line1 = nm, line2 = "";
        if (nm.includes(" ")) {
            const words = nm.split(" ");
            let best = 1, bestDiff = 1e9;
            for (let w = 1; w < words.length; w++) {
                const a = words.slice(0, w).join(" "), b = words.slice(w).join(" ");
                const diff = Math.abs(a.length - b.length);
                if (diff < bestDiff) { bestDiff = diff; best = w; }
            }
            line1 = words.slice(0, best).join(" ");
            line2 = words.slice(best).join(" ");
        }
        const nameSvg = line2
            ? `<text x="${px.toFixed(1)}" y="${(py + 6).toFixed(1)}" class="mm-node-text-cat" font-size="16" font-weight="800" fill="var(--txt)">${escapeHtml(line1)}</text>
          <text x="${px.toFixed(1)}" y="${(py + 26).toFixed(1)}" class="mm-node-text-cat" font-size="16" font-weight="800" fill="var(--txt)">${escapeHtml(line2)}</text>`
            : `<text x="${px.toFixed(1)}" y="${(py + 14).toFixed(1)}" class="mm-node-text-cat" font-size="16" font-weight="800" fill="var(--txt)">${escapeHtml(line1)}</text>`;
        nodesSvg += `<g class="mm-circle-cat" data-cat="${key}">
          <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${catRadius}" fill="var(--bg-1)" stroke="${color}" stroke-width="3" filter="url(#glow)"/>
          <text x="${px.toFixed(1)}" y="${(py - 30).toFixed(1)}" class="mm-node-text" font-size="32">${c.ico}</text>
          ${nameSvg}
          <text x="${px.toFixed(1)}" y="${(py + 48).toFixed(1)}" class="mm-node-text-cat" font-size="14" font-weight="700" fill="${color}">${codes.length}</text>
        </g>`;

        angle += span;
    });

    let svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="neonGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="blur"/><feFlood flood-color="#39ff14" flood-opacity="0.25" result="color"/><feComposite in="color" in2="blur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <rect width="${size}" height="${size}" fill="rgba(0,0,0,0.25)" rx="18"/>
      ${linesSvg}
      <circle cx="${cx}" cy="${cy}" r="62" fill="var(--bg-1)" stroke="var(--cyan)" stroke-width="3" filter="url(#glow)"/>
      <text x="${cx}" y="${cy}" class="mm-node-text" font-size="36" fill="var(--cyan)">CNC</text>
      ${nodesSvg}
    </svg>`;

    view.innerHTML = `
    <div class="mindmap-wrap">
      <div class="mm-title">${t("mindmap_title")} · ${MCODES.length} M</div>
      <div class="mm-controls">
        <button id="mmZoomIn">${t("mm_zoom_in")}</button>
        <button id="mmZoomOut">${t("mm_zoom_out")}</button>
        <button id="mmReset">${t("mm_reset")}</button>
        <button id="mmFull">${document.body.classList.contains("mm-full") ? t("mm_full_exit") : t("mm_full")}</button>
      </div>
      <div class="mm-container" id="mmContainer">${svg}</div>
      <div class="mm-hint-txt" style="text-align:center;color:var(--txt-faint);font-size:20px;margin-top:12px;">${t("mm_hint")}</div>
    </div>
  `;

    const container = document.getElementById("mmContainer");
    const svgEl = container.querySelector("svg");

    svgEl.querySelectorAll(".mm-code-rect").forEach(g => {
        g.addEventListener("click", function() { openCodeModal(this.dataset.code); });
    });
    svgEl.querySelectorAll(".mm-circle-cat").forEach(g => {
        g.addEventListener("click", function() { setPage("mcodes", this.dataset.cat); });
    });

    let scale = state.mmScale || 1;
    let translateX = state.mmTranslateX || 0;
    let translateY = state.mmTranslateY || 0;

    function applyTransform() {
        svgEl.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        svgEl.style.transformOrigin = "center center";
    }
    applyTransform();

    document.getElementById("mmZoomIn").addEventListener("click", () => {
        scale = Math.min(3, scale + 0.15); state.mmScale = scale; applyTransform();
    });
    document.getElementById("mmZoomOut").addEventListener("click", () => {
        scale = Math.max(0.4, scale - 0.15); state.mmScale = scale; applyTransform();
    });
    document.getElementById("mmReset").addEventListener("click", () => {
        scale = 1; translateX = 0; translateY = 0;
        state.mmScale = 1; state.mmTranslateX = 0; state.mmTranslateY = 0;
        applyTransform();
    });
    document.getElementById("mmFull").addEventListener("click", () => {
        document.body.classList.toggle("mm-full");
        window.scrollTo(0, 0);
        const b = document.getElementById("mmFull");
        b.textContent = document.body.classList.contains("mm-full") ? t("mm_full_exit") : t("mm_full");
    });

    /* Pan + pinch: pointer events → működik egérrel ÉS érintéssel */
    const pointers = new Map();
    let panStart = null, pinchStartDist = 0, pinchStartScale = 1;

    container.addEventListener("pointerdown", e => {
        if (e.target.closest(".mm-code-rect") || e.target.closest(".mm-circle-cat")) return;
        container.setPointerCapture(e.pointerId);
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (pointers.size === 1) {
            panStart = { x: e.clientX, y: e.clientY, tx: translateX, ty: translateY };
        } else if (pointers.size === 2) {
            panStart = null;
            const p = [...pointers.values()];
            pinchStartDist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
            pinchStartScale = scale;
        }
    });
    container.addEventListener("pointermove", e => {
        if (!pointers.has(e.pointerId)) return;
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (pointers.size === 2 && pinchStartDist > 0) {
            const p = [...pointers.values()];
            const d = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
            scale = Math.min(3, Math.max(0.4, pinchStartScale * d / pinchStartDist));
            state.mmScale = scale;
            applyTransform();
        } else if (pointers.size === 1 && panStart) {
            translateX = panStart.tx + (e.clientX - panStart.x);
            translateY = panStart.ty + (e.clientY - panStart.y);
            state.mmTranslateX = translateX; state.mmTranslateY = translateY;
            applyTransform();
        }
    });
    function endPointer(e) {
        pointers.delete(e.pointerId);
        if (pointers.size < 2) pinchStartDist = 0;
        if (pointers.size === 1) {
            const p = [...pointers.values()][0];
            panStart = { x: p.x, y: p.y, tx: translateX, ty: translateY };
        } else if (pointers.size === 0) panStart = null;
    }
    container.addEventListener("pointerup", endPointer);
    container.addEventListener("pointercancel", endPointer);

    container.addEventListener("wheel", (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        scale = Math.min(3, Math.max(0.4, scale + delta));
        state.mmScale = scale;
        applyTransform();
    }, { passive: false });
}

/* ============================================================
   M-KÓD SZERKESZTŐ (új / módosítás / törlés)
   ============================================================ */
let edState = null;

function blankCode() {
    const mk = () => ({ hu: "", ro: "", de: "", en: "" });
    return { code: "", cat: "move", name: mk(), exp: mk(), when: mk(), ex: "", warn: mk() };
}

function openEditor(code) {
    const m = code ? byCode[code] : null;
    edState = {
        orig: m ? m.code : null,
        lang: state.lang,
        data: m ? normalizeCode(JSON.parse(JSON.stringify(m))) : blankCode()
    };
    drawEditor();
}

function drawEditor() {
    let old = document.getElementById("edBackdrop");
    if (old) old.remove();
    const d = edState.data;
    const L = edState.lang;
    const wrap = document.createElement("div");
    wrap.id = "edBackdrop";
    wrap.className = "ed-backdrop";
    wrap.innerHTML = `
    <div class="ed-modal">
      <button class="ed-close" id="edClose">✕</button>
      <h2>${edState.orig ? t("ed_title_edit") : t("ed_title_new")}</h2>
      <div class="ed-hint">${t("ed_langhint")}</div>
      <div class="ed-row">
        <div class="ed-field">
          <label>${t("ed_code")}</label>
          <input id="edCode" class="mono" type="text" value="${escapeHtml(d.code)}" placeholder="M120">
        </div>
        <div class="ed-field">
          <label>${t("ed_cat")}</label>
          <select id="edCat">
            ${Object.keys(CATS).map(k => `<option value="${k}" ${d.cat===k?"selected":""}>${CATS[k].ico} ${escapeHtml(catName(k))}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="ed-langtabs">
        ${LANGS.map(l => `<button class="ed-langtab ${l===L?"active":""}" data-edlang="${l}">${l.toUpperCase()}</button>`).join("")}
      </div>
      <div class="ed-field">
        <label>${t("ed_name")} (${L.toUpperCase()})</label>
        <input id="edName" type="text" value="${escapeHtml(d.name[L])}">
      </div>
      <div class="ed-field">
        <label>${t("ed_exp")} (${L.toUpperCase()})</label>
        <textarea id="edExp">${escapeHtml(d.exp[L])}</textarea>
      </div>
      <div class="ed-field">
        <label>${t("ed_when")} (${L.toUpperCase()})</label>
        <textarea id="edWhen">${escapeHtml(d.when[L])}</textarea>
      </div>
      <div class="ed-field">
        <label>${t("ed_warn")} (${L.toUpperCase()})</label>
        <textarea id="edWarn">${escapeHtml(d.warn[L])}</textarea>
      </div>
      <div class="ed-field">
        <label>${t("ed_ex")}</label>
        <textarea id="edEx" class="mono">${escapeHtml(d.ex)}</textarea>
      </div>
      <div class="ed-actions">
        <button class="ed-btn primary" id="edSave">${t("ed_save")}</button>
        <button class="ed-btn ghost" id="edCancel">${t("ed_cancel")}</button>
        ${edState.orig ? `<button class="ed-btn danger" id="edDelete">${t("ed_delete")}</button>` : ""}
      </div>
    </div>`;
    document.body.appendChild(wrap);

    wrap.addEventListener("click", e => { if (e.target === wrap) closeEditor(); });
    document.getElementById("edClose").addEventListener("click", closeEditor);
    document.getElementById("edCancel").addEventListener("click", closeEditor);
    document.getElementById("edSave").addEventListener("click", saveEditor);
    const del = document.getElementById("edDelete");
    if (del) del.addEventListener("click", deleteFromEditor);
    wrap.querySelectorAll("[data-edlang]").forEach(b => {
        b.addEventListener("click", function() {
            commitEditorInputs();
            edState.lang = this.dataset.edlang;
            drawEditor();
        });
    });
}

function commitEditorInputs() {
    const d = edState.data, L = edState.lang;
    d.code = document.getElementById("edCode").value.trim().toUpperCase();
    d.cat = document.getElementById("edCat").value;
    d.name[L] = document.getElementById("edName").value.trim();
    d.exp[L] = document.getElementById("edExp").value.trim();
    d.when[L] = document.getElementById("edWhen").value.trim();
    d.warn[L] = document.getElementById("edWarn").value.trim();
    d.ex = document.getElementById("edEx").value;
}

function fillLangs(o) {
    const first = o.hu || o.ro || o.de || o.en || "";
    LANGS.forEach(l => { if (!o[l]) o[l] = first; });
}

function saveEditor() {
    commitEditorInputs();
    const d = edState.data;
    if (!/^M\d+[A-Z0-9]*$/.test(d.code)) { toast(t("ed_code_err")); return; }
    if (d.code !== edState.orig && byCode[d.code]) { toast(t("ed_dup_err")); return; }
    ["name", "exp", "when"].forEach(f => fillLangs(d[f]));
    const anyWarn = LANGS.some(l => d.warn[l]);
    if (anyWarn) fillLangs(d.warn);
    if (!d.ex.trim()) d.ex = d.code;
    if (edState.orig) {
        const i = MCODES.findIndex(m => m.code === edState.orig);
        if (i >= 0) MCODES[i] = d; else MCODES.push(d);
        if (edState.orig !== d.code && state.notes[edState.orig]) {
            state.notes[d.code] = state.notes[edState.orig];
            delete state.notes[edState.orig];
            save();
        }
    } else {
        MCODES.push(d);
    }
    saveMcodes();
    closeEditor();
    render();
    toast(t("ed_saved") + " · " + d.code);
}

function deleteFromEditor() {
    if (!confirm(t("ed_confirm_del"))) return;
    MCODES = MCODES.filter(m => m.code !== edState.orig);
    saveMcodes();
    closeEditor();
    render();
    toast(t("ed_deleted"));
}

function closeEditor() {
    const el = document.getElementById("edBackdrop");
    if (el) el.remove();
    edState = null;
}

function resetToDefaults() {
    if (!confirm(t("ed_reset_confirm"))) return;
    MCODES = JSON.parse(JSON.stringify(DEFAULT_MCODES));
    localStorage.removeItem(LS + "data");
    rebuildIndex();
    render();
    toast(t("ed_reset_done"));
}

/* ============================================================
   MUNKAMENETEK
   ============================================================ */
function renderFlows() {
    const f = FLOWS.find(x => x.id === state.flow) || FLOWS[0];
    const tabs = FLOWS.map(x => `<button class="flow-tab ${x.id===f.id?'active':''}" data-flow="${x.id}">${getText(x.name)}</button>`).join("");
    const nodes = f.steps.map((s, i) => {
        let html = "";
        const m = s.code ? byCode[s.code] : null;
        if (m) {
            const c = CATS[m.cat];
            html = `<div class="flow-node" style="--fc:${c.color}" data-code="${escapeHtml(m.code)}" title="${t('mm_hint')}">
        <div class="fc-code">${escapeHtml(m.code)}</div>
        <div class="fc-txt"><div class="fh">${escapeHtml(getText(m.name))}</div><div class="fr">${escapeHtml(m.name.ro)}</div></div>
      </div>`;
        } else if (s.code) {
            html = `<div class="flow-node plain"><div class="fc-code">${escapeHtml(s.code)}</div><div class="fc-txt"><div class="fh">${escapeHtml(s.code)}</div></div></div>`;
        } else {
            const codeHint = s.code2 ? s.code2.join(" / ") : "•";
            const plainText = s.plain ? getText(s.plain) : "•";
            html = `<div class="flow-node plain"><div class="fc-code">${escapeHtml(codeHint)}</div><div class="fc-txt"><div class="fh">${escapeHtml(plainText)}</div></div></div>`;
        }
        const arrow = i < f.steps.length - 1 ? `<div class="flow-arrow"></div>` : "";
        return `<div class="flow-step">${html}</div>${arrow}`;
    }).join("");
    view.innerHTML = `
    <div class="flow-tabs">${tabs}</div>
    <div class="flow-title">⚙️ ${getText(f.name)}</div>
    <div class="flow-desc">${getText(f.desc)}</div>
    <div class="flowchart">${nodes}</div>
  `;
    document.querySelectorAll(".flow-tab").forEach(el => el.addEventListener("click", function() { state.flow = this.dataset.flow; renderFlows(); }));
    document.querySelectorAll(".flow-node[data-code]").forEach(el => el.addEventListener("click", function() { openCodeModal(this.dataset.code); }));
}

/* ============================================================
   CNC SZÓTÁR
   ============================================================ */
function renderDictionary() {
    const sorted = [...MCODES].sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
    const items = sorted.map(m => `<div class="dict-item" data-edit="${escapeHtml(m.code)}" style="cursor:pointer;">
      <span class="d-code">${escapeHtml(m.code)}</span><span class="d-hu">${escapeHtml(getText(m.name))}</span><span class="d-ro">${escapeHtml(m.name.ro)}</span><span class="d-exp">${escapeHtml(getText(m.exp))}</span>
    </div>`).join("");
    view.innerHTML = `
    <div class="dict-actions">
      <button class="dict-dl" id="dlCsv">⬇️ ${t("dl_csv")}</button>
      <button class="dict-dl" id="addCodeBtn">${t("ed_add")}</button>
    </div>
    <div class="dict-list">
      <div class="dict-item" style="font-weight:700;background:var(--glass-strong);border-color:var(--stroke);">
        <span>${t("dict_code")}</span><span>${t("dict_hu")}</span><span>${t("dict_ro")}</span><span>${t("dict_exp")}</span>
      </div>
      ${items}
    </div>
  `;
    document.getElementById("dlCsv").addEventListener("click", downloadCsv);
}

/* ============================================================
   LETÖLTÉS – CSV és teljes HTML (a szerkesztett adatokkal!)
   ============================================================ */
function downloadCsv() {
    const rows = [["Code","Cat","HU","RO","DE","EN","Explanation_HU","Explanation_RO","Explanation_DE","Explanation_EN"]];
    for (const m of MCODES) rows.push([m.code, m.cat, m.name.hu, m.name.ro, m.name.de, m.name.en, m.exp.hu, m.exp.ro, m.exp.de, m.exp.en]);
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "cnc_mkodok_szotar.csv";
    a.click();
    URL.revokeObjectURL(a.href);
    toast("CSV ⬇️");
}

function downloadFullHtml() {
    /* A saját módosításokat beleírjuk a letöltött fájlba, így az bárhol megnyitva
       a szerkesztett M-kódokat mutatja. */
    const dataEl = document.getElementById("mcodeData");
    if (dataEl) dataEl.textContent = JSON.stringify(MCODES).replace(/<\//g, "<\\/");
    const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "cnc-mcod-tanulo.html";
    a.click();
    URL.revokeObjectURL(a.href);
    toast(t("toast_dl"));
}

/* ============================================================
   GLOBÁLIS ESEMÉNYEK
   ============================================================ */
document.addEventListener("click", e => {
    const tEl = e.target;
    const nav = tEl.closest(".nav-item");
    if (nav) { setPage(nav.dataset.page); return; }
    if (tEl.closest("#addCodeBtn") || tEl.closest("#addBtnSide")) { openEditor(null); closeSidebar(); return; }
    if (tEl.closest("#resetBtn")) { resetToDefaults(); return; }
    const head = tEl.closest(".cat-head");
    if (head && state.page === "mcodes") {
        const k = head.dataset.toggle;
        state.collapsed[k] = !state.collapsed[k];
        save();
        document.getElementById("cat-" + k).classList.toggle("collapsed", state.collapsed[k]);
        return;
    }
    const note = tEl.closest("[data-note]");
    if (note) {
        const box = document.getElementById("note-" + note.dataset.note);
        if (box) { box.classList.toggle("show"); if (box.classList.contains("show")) box.querySelector("textarea").focus(); }
        return;
    }
    const copy = tEl.closest("[data-copy]");
    if (copy) {
        const m = byCode[copy.dataset.copy];
        if (!m) return;
        const txt = `${m.code} — ${getText(m.name)} (${m.name.ro})\n${getText(m.exp)}\n${t("card_when")}: ${getText(m.when)}\n${t("card_ex")}: ${m.ex}`;
        navigator.clipboard?.writeText(txt).then(() => toast(m.code + " " + t("toast_copy")), () => toast(t("toast_copy_fail")));
        return;
    }
    const ed = tEl.closest("[data-edit]");
    if (ed) { openEditor(ed.dataset.edit); return; }
    if (tEl.closest("#themeBtn")) { toggleTheme(); return; }
    if (tEl.closest("#dlBtn")) { downloadFullHtml(); return; }
    if (tEl.closest("#hamburger")) { $("#sidebar").classList.add("open"); $("#backdrop").classList.add("show"); return; }
    if (tEl.closest("#backdrop")) { closeSidebar(); }
});

document.addEventListener("input", e => {
    const ta = e.target.closest("[data-noteinput]");
    if (ta) {
        const code = ta.dataset.noteinput;
        const v = ta.value.trim();
        if (v) state.notes[code] = ta.value; else delete state.notes[code];
        save();
    }
});

$("#search").addEventListener("input", function() {
    state.search = this.value;
    $("#searchClear").style.display = this.value ? "block" : "none";
    const ds = document.getElementById("dashSearch");
    if (ds && ds.value !== this.value) ds.value = this.value;
    if (state.page === "mcodes") renderMcodes();
    else if (this.value.trim()) setPage("mcodes");
});

$("#searchClear").addEventListener("click", () => {
    $("#search").value = ""; state.search = ""; $("#searchClear").style.display = "none";
    const ds = document.getElementById("dashSearch");
    if (ds) ds.value = "";
    if (state.page === "mcodes") renderMcodes(); else render();
    $("#search").focus();
});

function closeSidebar() { $("#sidebar").classList.remove("open"); $("#backdrop").classList.remove("show"); }

function toggleTheme() {
    const cur = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
    applyTheme(cur);
    localStorage.setItem(LS + "theme", cur);
    toast(t("toast_theme_" + cur));
}
function applyTheme(th) {
    document.documentElement.setAttribute("data-theme", th);
    $("#themeBtn").innerHTML = th === "light" ? "☀️ Temă" : "🌙 Temă";
}

document.addEventListener("keydown", e => {
    const typing = /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
    if (e.key === "/" && !typing) { e.preventDefault(); $("#search").focus(); return; }
    if (e.key === "Escape") {
        const edm = document.getElementById("edBackdrop"); if (edm) { closeEditor(); return; }
        const modal = document.getElementById("codeModalBackdrop"); if (modal) modal.remove();
        if (typing) document.activeElement.blur();
        return;
    }
    if (typing) return;
    const pages = ["dashboard", "mcodes", "mindmap", "flows", "safety", "dictionary"];
    if (["1","2","3","4","5","6"].includes(e.key)) { setPage(pages[+e.key - 1]); return; }
    if (e.key.toLowerCase() === "t") { toggleTheme(); return; }
    if (e.key.toLowerCase() === "n") { openEditor(null); return; }
});

(function init() {
    applyTheme(localStorage.getItem(LS + "theme") || "dark");
    state.lang = localStorage.getItem(LS + "lang") || "ro";
    setPage("dashboard");
})();
</script>
